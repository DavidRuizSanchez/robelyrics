# Personas del universo Entre Interiores.
#
# Esto pobla `persons` + `band_memberships`. El seed (`scripts.seed_persons`)
# completa datos faltantes desde Wikipedia/Wikidata: fechas, biografía corta,
# Q-ID, y foto en Wikimedia Commons.
#
# Convenciones:
#   - slug: kebab-case sin acentos
#   - artist (en memberships): slug del Artist en DB (extremoduro|robe)
#   - era: string libre ("1987-2014", "Banda solista 2017-2025")
#   - Si no aparece `birth_date` el seed lo intenta sacar de Wikidata.
#   - `wikipedia_url` ayuda al seed a encontrar el Q-ID si no se conoce.
#
# Para añadir grupos amigos como personas (Kutxi Romero, Fito Cabrales, etc.),
# añade su entrada SIN memberships (sus bandas no están en nuestro Artist
# corpus). El JSON-LD usará `sameAs` a Wikidata para enlazar.

persons:
  # =========================================================================
  # Extremoduro / Robe — eje del proyecto
  # =========================================================================

  - slug: robe-iniesta
    full_name: Robe Iniesta
    stage_name: Robe
    birth_date: 1962-05-16
    death_date: 2025-12-10
    birth_place: Plasencia, Cáceres
    wikipedia_url: https://es.wikipedia.org/wiki/Robe_Iniesta
    wikidata_id: Q3500822
    # Imagen hardcoded — Wikidata Q3500822 NO tiene P18, así que el script
    # no encontraba foto válida. Esta es libre (CC BY-SA), real, etiquetada.
    image_filename: "Robe Iniesta en Valladolid en 2014.jpg"
    memberships:
      - artist: extremoduro
        role: vocalista
        era: 1987-2014
        is_founder: true
        position: 1
      - artist: robe
        role: vocalista
        era: 2014-2025
        is_founder: true
        position: 1

  - slug: inaki-uoho-anton
    full_name: Iñaki Antón
    stage_name: Uoho
    wikipedia_url: https://es.wikipedia.org/wiki/I%C3%B1aki_Ant%C3%B3n
    memberships:
      - artist: extremoduro
        role: guitarrista
        era: 1996-2014
        position: 2

  - slug: miguel-colino
    full_name: Miguel Colino
    wikipedia_url: https://es.wikipedia.org/wiki/Miguel_Colino
    memberships:
      - artist: extremoduro
        role: bajista
        # era corregida: entró en 2001 (antes el yaml decía 1996).
        era: 2001-2014
        position: 4

  - slug: jose-ignacio-cantera
    full_name: José Ignacio Cantera
    stage_name: Iñaki Cantera
    wikipedia_url: https://es.wikipedia.org/wiki/Jos%C3%A9_Ignacio_Cantera
    memberships:
      - artist: extremoduro
        role: batería
        # era corregida: entró en 1997 (antes el yaml decía 2008).
        era: 1997-2014
        position: 5

  # =========================================================================
  # Extremoduro — miembros históricos (formaciones anteriores)
  # Fuente: infobox + sección «Componentes» de Wikipedia ES (transcripción
  # verbatim del campo `exmiembros`). Los nombres/apodos son fiables; los
  # apellidos completos, instrumentos y años proceden de la sección
  # «Componentes» y conviene una revisión final. Sin wikipedia_url propio:
  # son músicos sin artículo individual, el seed no podrá enriquecerlos.
  # =========================================================================

  - slug: kaito
    full_name: Kaíto
    memberships:
      - artist: extremoduro
        role: bajista
        era: "1987"
        position: 6

  - slug: william-extremoduro
    full_name: William
    memberships:
      - artist: extremoduro
        role: batería
        era: "1987"
        position: 7

  - slug: salo
    full_name: Gonzalo Muñoz
    stage_name: Salo
    # Corregido: el yaml antiguo lo daba como «Salomón Hernández, batería
    # 1996-2007», dato erróneo. El verdadero «Salo» de Extremoduro es
    # Gonzalo Muñoz, bajista y luego guitarrista de la etapa inicial.
    memberships:
      - artist: extremoduro
        role: bajista
        era: 1988-1990
