# Whitelist de fuentes para el scraper de noticias del blog Entre Interiores.
#
# Política editorial post-muerte de Robe (10/12/2025):
#   - Cubrimos Robe, Extremoduro, miembros (Uoho y demás), grupos amigos,
#     bandas tributo activas.
#   - Prensa comercial generalista vetada (Mondo Sonoro, Efe Eme, Rockdelux)
#     por línea editorial del corpus principal.
#   - SOLO fuentes que el scraper puede consumir vía RSS o HTML estructurado.
#
# Estructura:
#   terms_groups: agrupaciones de términos que disparan el match. Todos los
#     grupos activos suman. Para desactivar uno, comenta o pon lista vacía.
#   sources: lista de fuentes a rastrear
#     - name:    string visible en `Post.source_name`
#       url:     URL del feed RSS o de la página índice si kind=html
#       kind:    'rss' o 'html'
#       enabled: bool (default true)
#       tier:    'trusted'  → auto-publica (respeta cap 2/sem)
#                'review'   → entra como pending_review (revisión manual)
#       selector: solo para kind=html (CSS selector de los items)
#
# Auto-publish vs review:
#   - 'trusted' es para feeds RSS de medios que conocemos y donde la voz
#     del medio no contamina la nuestra (la reescritura editorial es a tope).
#   - 'review' deja al admin la decisión final.

terms_groups:
  core:
    - robe iniesta
    - extremoduro
    - "robe"  # comodín — el matcher es case-insensitive y solo palabra parcial
  members:
    - uoho
    - iñaki antón
    - inaki anton
    - salo
    - miguel colino
    - luis von fanta
    - mariano garcía
    - kolibrí
  friends:
    - marea
    - kutxi romero
    - platero y tú
    - fito cabrales
    - reincidentes
    - manolo kabezabolo
    - rosendo
    - barricada
    - soziedad alkoholika
  tributes: []  # poblar a medida que confirmemos tributos activos

sources:
  # --- Prensa extremeña local (cobertura natural Robe / Plasencia) ---
  - name: "Hoy (Extremadura) — Cultura"
    url: "https://www.hoy.es/rss/2.0/?section=culturas"
    kind: rss
    enabled: true
    tier: review

  - name: "El Periódico Extremadura — Cultura"
    url: "https://www.elperiodicoextremadura.com/rss/section/CULTURA/"
    kind: rss
    enabled: true
    tier: review

  # --- Webs oficiales / grupos amigos ---
  # Web oficial Marea (Kutxi Romero). Si el feed no responde el scraper lo tolera.
  - name: "Marea (oficial)"
    url: "https://www.mareaweb.es/feed/"
    kind: rss
    enabled: true
    tier: trusted

  - name: "Reincidentes (oficial)"
    url: "https://www.reincidentes.es/feed/"
    kind: rss
    enabled: true
    tier: trusted

  # --- Plantilla para añadir más a mano ---
  # - name: "Nueva fuente"
  #   url: "https://..."
  #   kind: rss
  #   enabled: true
  #   tier: review
