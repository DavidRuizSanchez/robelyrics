    tier: trusted

  - name: "Dirty Rock Magazine"
    url: "https://dirtyrock.info/feed/"
    kind: rss
    enabled: true
    tier: trusted

  - name: "Science of Noise"
    url: "https://scienceofnoise.net/feed/"
    kind: rss
    enabled: true
    tier: trusted
