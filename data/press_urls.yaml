# Listado de URLs de prensa, blogs y papers para fetch_press.py
#
# Dos secciones:
#   - press_seo_only: medios cuyo tono mezcla redacción y cita literal
#     (Mondo Sonoro, Efe Eme, Rockdelux, El País, eldiario.es, etc.).
#     Estas fuentes entran con for_seo_only=True para que el destilador
#     poético las excluya y solo las consuma el generador de contenido SEO
#     de la capa pública.
#   - press: medios y papers compatibles también con la rama destiladora.
#
# Cada entrada acepta:
#   url     (obligatorio)
#   title   (obligatorio)
#   author  (opcional)
#   kind    (opcional, default 'press' | otros: 'blog', 'thesis')

