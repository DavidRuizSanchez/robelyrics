# ============================================================
# Discografía semilla para RobeLyrics
# ============================================================
# Fuente: conocimiento general + verificación cruzada en Genius
# y Wikipedia. Las entradas marcadas con `# verificar` requieren
# revisión humana antes de ejecutar el pipeline de ingesta —
# títulos exactos, años, y si Genius los indexa.
#
# kind ∈ {studio, live, compilation, ep}
# ============================================================

artists:
  - slug: extremoduro
    name: Extremoduro
    active_years: "1989-2014"
    albums:
      - title: "Rock Transgresivo"
        year: 1989
        kind: studio
        slug: rock-transgresivo
        # release_date pendiente: el casete original de 1989 no tiene fecha
        # exacta conocida. La reedición de estudio se publicó el 26/08/1994.

      - title: "Somos unos animales"
        year: 1991
        kind: ep
        slug: somos-unos-animales
        # verificar: a veces clasificado como EP/maxi, a veces como single
        # release_date pendiente: solo se conoce "julio de 1991", sin día.

      - title: "Deltoya"
        year: 1992
        kind: studio
        slug: deltoya
        # release_date pendiente: junio de 1992, día discrepante entre
        # fuentes (iTunes 08/06, Amazon 15/06). Sin confirmación oficial.

      - title: "¿Dónde están mis amigos?"
        year: 1993
        kind: studio
        slug: donde-estan-mis-amigos

      - title: "Agila"
        year: 1996
        kind: studio
        slug: agila

      - title: "Iros todos a tomar por culo"
        year: 1997
        kind: live
        slug: iros-todos-a-tomar-por-culo

      - title: "Canciones prohibidas"
        year: 1998
        kind: studio
        slug: canciones-prohibidas

      - title: "Yo, minoría absoluta"
        year: 2002
        kind: studio
        slug: yo-minoria-absoluta

      - title: "La ley innata"
        year: 2008
        kind: studio
        slug: la-ley-innata

      - title: "Material defectuoso"
        year: 2011
        kind: studio
        slug: material-defectuoso
        # verificar: tiene rarezas + tomas alternativas, en Genius puede
        # aparecer mezclado con singles sueltos

      - title: "Para todos los públicos"
        year: 2013
        kind: studio
        slug: para-todos-los-publicos

  - slug: robe
    name: Robe Iniesta
    active_years: "2014-presente"
    albums:
      - title: "Lo que aletea en nuestras cabezas"
        year: 2015            # corregido: era 2014, publicado el 09/06/2015
        kind: studio
        slug: lo-que-aletea-en-nuestras-cabezas
        release_date: 2015-06-09

      - title: "Destrozares, Canciones para el Final de los Tiempos"
        year: 2016            # corregido: era 2018 (2018 es el directo)
        kind: studio
        slug: destrozares
        release_date: 2016-11-18

      - title: "Mayéutica"
        year: 2021
        kind: studio
        slug: mayeutica

      - title: "Se nos lleva el aire"
        year: 2023            # corregido: era 2024, publicado el 15/12/2023
        kind: studio
        slug: se-nos-lleva-el-aire
        release_date: 2023-12-15

# ============================================================
# Notas de operación
# ============================================================
# 1. El script ingest.py debe usar `slug` como clave estable. Si
#    cambia el título por algún motivo, el slug NO debe cambiar.
# 2. Para cada album.kind == "live" o "compilation", el ingest debe
#    decidir si reusa songs ya existentes (mismo título + artista) o
#    crea duplicados. Decisión por defecto: crear filas nuevas (la
#    versión en directo puede tener letra ligeramente distinta).
# 3. Excluido del corpus por decisión del usuario:
#    - Extrechinato y tú (2000)
#    - Iniciativa Sexual Yacumamba (proyecto de Iñaki, no Robe)
#    - Colaboraciones puntuales con otros artistas
