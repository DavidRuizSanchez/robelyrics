name: security

# Escanea las imágenes upstream que NO construimos nosotros — Aikido Free
# limita a 2 imágenes y se las dedicamos a robelyrics-api / robelyrics-web.
# Trivy es OSS, sin límite.
#
# Cadencia: en push a main + cron semanal (porque las imágenes se etiquetan
# v.x.y y los CVE pueden aparecer sin que nosotros toquemos nada).
#
# El output de Trivy (formato table en stdout + SARIF como artifact) queda
# en el log del workflow y descargable. NO se sube a GitHub Code Scanning
# porque Code Scanning requiere GitHub Advanced Security, que no está
# disponible gratis en repos privados de cuentas personales.

on:
  push:
    branches: [main]
  schedule:
    # Cada lunes a las 07:00 UTC = 09:00 Madrid en horario de invierno
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trivy-upstream-images:
    name: Trivy · imágenes upstream
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - postgres:16-alpine
          - qdrant/qdrant:v1.12.1
          - caddy:2-alpine
    steps:
      - name: Run Trivy (table en log) on ${{ matrix.image }}
        # Pinned a SHA por seguridad de supply chain. Tag equivalente: v0.36.0.
        # Para bumpear: gh api repos/aquasecurity/trivy-action/tags --jq '.[0]'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'  # Reportar pero no romper el build (uso personal)

      - name: Run Trivy (SARIF artifact) on ${{ matrix.image }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: sarif
          output: trivy-${{ strategy.job-index }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF artifact
        # Pinned a SHA por supply-chain hardening. Tag equivalente: v7.0.1.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: trivy-${{ strategy.job-index }}-sarif
          path: trivy-${{ strategy.job-index }}.sarif
          retention-days: 30
