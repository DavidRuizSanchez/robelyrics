name: robelyrics

# Override de producción.
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Cambios respecto a docker-compose.yml (dev):
#   1. Postgres/Qdrant/API/Web NO exponen puertos al host. Solo Caddy
#      expone 80/443 al exterior. Comunicación interna via red docker.
#   2. Web/API leen NEXT_PUBLIC_API_URL apuntando a https://entreinteriores.com/api
#   3. SITE_URL en https público (links de email correctos).
#   4. Caddy con TLS automático via Let's Encrypt.
#   5. **Build de producción**: api y web usan Dockerfile.prod (multi-stage,
#      sin bind mount del código, usuario no-root, uvicorn workers, next
#      build + next start). Para deploys: `docker compose build api web`.

services:
  postgres:
    ports: !reset []

  qdrant:
    ports: !reset []

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    ports: !reset []
    # Sin bind mount del código (el Dockerfile.prod ya lo copió en build).
    # data y web-public sí mantenidos: cambian sin requerir rebuild.
    volumes: !override
      - ./data:/app/data:ro
      - ./web/public:/app/web-public
    environment:
      SITE_URL: https://entreinteriores.com
      NEXT_PUBLIC_API_URL: https://entreinteriores.com/api
      ALLOWED_ORIGINS: https://entreinteriores.com,https://www.entreinteriores.com
    # Producción: workers, sin --reload, log warning. proxy-headers para
    # que rate_limit.client_ip lea X-Forwarded-For correctamente.
    command: >-
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --workers 2
      --proxy-headers --forwarded-allow-ips=*
      --log-level warning

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://entreinteriores.com/api
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    ports: !reset []
    # Sin bind mounts (la imagen built ya tiene código + .next compilado).
    volumes: !override []
    environment:
      NEXT_PUBLIC_API_URL: https://entreinteriores.com/api
      API_INTERNAL_URL: http://api:8000
      SITE_URL: https://entreinteriores.com
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NODE_ENV: production
    # Override del CMD del Dockerfile dev (`pnpm dev`) ya no aplica:
    # Dockerfile.prod usa CMD `pnpm start`. Aquí lo explicitamos para
    # que docker-compose.yml no lo sobreescriba con `pnpm dev`.
    command: pnpm start

  caddy:
    image: caddy:2-alpine
    container_name: robelyrics-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - robelyrics
    depends_on:
      - api
      - web

volumes:
  caddy-data:
  caddy-config:
